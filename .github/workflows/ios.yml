name: Build iOS IPA (Free Method)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 🌟 تم التحديث هنا

      - name: Setup Node.js
        uses: actions/setup-node@v4 # 🌟 تم التحديث هنا
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods (iOS Dependencies)
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace "runTracker.xcworkspace" -scheme "runTracker" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r run-tracker.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4 # 🌟 تم التحديث هنا
        with:
          name: run-tracker-ipa
          path: run-tracker.ipa
