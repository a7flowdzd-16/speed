name: Build iOS IPA (Free Method)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods (iOS Dependencies)
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned)
        run: |
          cd ios
          # اكتشاف اسم المشروع تلقائياً
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo $WORKSPACE | sed 's/\.xcworkspace//')
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          # البحث عن ملف .app الناتج تلقائياً
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r run-tracker.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-tracker-ipa
          path: run-tracker.ipa
