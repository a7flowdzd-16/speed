name: Build iOS IPA (Free Method)

on:
  workflow_dispatch: 

env:
  # هذا السطر يخفي التحذير المزعج بخصوص Node.js 20 في نهاية السجل
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods (iOS Dependencies)
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo $WORKSPACE | sed 's/\.xcworkspace//')
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # إضافة CODE_SIGNING_IDENTITY="" لضمان عدم بحث Xcode عن أي شهادة إطلاقاً
          # وإضافة COMPILER_INDEX_STORE_ENABLE=NO لتقليل استهلاك الذاكرة وتجنب أخطاء البناء الوهمية
          xcodebuild build -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          mkdir Payload
          find ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} Payload/ \;
          zip -r run-tracker.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-tracker-ipa
          path: run-tracker.ipa
