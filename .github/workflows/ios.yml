name: Build iOS IPA (Free Method)

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fix Node path for Xcode
        # XCode مسارات النظام أحياناً تتجاهل إعدادات Node في سيرفرات جيت هاب، 
        # هذا السطر يحل مشكلة الـ (Exit Code 65) المتعلقة بسكربتات React Native المخفية.
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which npm) /usr/local/bin/npm || true
          sudo ln -s $(which npx) /usr/local/bin/npx || true

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods (iOS Dependencies)
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo $WORKSPACE | sed 's/\.xcworkspace//')
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # تثبيت أداة لتوضيح الأخطاء في حال الفشل
          gem install xcpretty
          
          # تشغيل البناء مع ربط الأداة لتنظيف المخرجات وإظهار الخطأ الحقيقي
          set -o pipefail
          xcodebuild build -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO | xcpretty

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} Payload/ \;
          zip -r run-tracker.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-tracker-ipa
          path: run-tracker.ipa
